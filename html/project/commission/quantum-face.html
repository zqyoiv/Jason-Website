<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link href="/images/favicon/jupiter_gif_still.png"
    rel="icon"
    type="image/png" />
  <title>
   QUANTUM FACE - Jason Krugman Studio
  </title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/project.css" rel="stylesheet"/>
  <script src="/js/project-size.js">
  </script>
 </head>
 <body>
  <div id="header-placeholder">
  </div>
  <script src="/js/include-header.js">
  </script>
  <main class="project-page">
   <div id="project-body">
    <h1 class="project-title">
     QUANTUM FACE
    </h1>
    <div class="project-image-full">
     <img alt="" src="/images/project/commission/quantum-face/qf1.png"/>
    </div>
    <div class="project-content">
     <div class="project-description">
      <p>
       In 2023, Krugman Studio created Quantum Face in collaboration Yevgeny
       Koramblyum. The artwork uses Krugman's Jupiter LED system to create an
       electrified mesh of circuit boards describing the surface of the mesh.
      </p>
     </div>
     <div class="project-details">
      <div class="detail-item">
       <span class="detail-label">
        Dimensions:
       </span>
       <span class="detail-value">
        96'' x 60'' x 26'' ( H x W x D)
       </span>
      </div>
     </div>
    </div>
    <div class="project-image-full">
     <img alt="" src="/images/project/commission/quantum-face/qf2.jpg"/>
    </div>
    <div class="project-image-full">
     <img alt="" src="/images/project/commission/quantum-face/qf3.jpg"/>
    </div>
    <div class="project-image-full">
     <img alt="" src="/images/project/commission/quantum-face/qf4.png"/>
    </div>
    <div class="project-video-full">
     <iframe allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
       allowfullscreen=""
       class="vimeo-iframe"
       frameborder="0"
       height="360"
       referrerpolicy="strict-origin-when-cross-origin"
       src="https://player.vimeo.com/video/1061632286?autoplay=1&amp;muted=1"
       title="vimeo-player"
       width="640">
     </iframe>
    </div>
    <div class="project-video-full">
     <iframe allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
       allowfullscreen=""
       class="vimeo-iframe"
       data-orientation="portrait"
       frameborder="0"
       height="360"
       referrerpolicy="strict-origin-when-cross-origin"
       src="https://player.vimeo.com/video/829375795?autoplay=1&amp;muted=1"
       title="vimeo-player"
       width="640">
     </iframe>
    </div>
   </div>
  </main>
  <div id="footer-placeholder">
  </div>
  <script src="/js/include-footer.js">
  </script>
 </body>
</html>
