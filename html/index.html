<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="/images/favicon/jupiter_gif_still.png"
      rel="icon"
      type="image/png" />
    <title>
      Jason Krugman Studio
    </title>
    <link href="/css/styles.css" rel="stylesheet"/>
  </head>
  <body>
    <div id="header-placeholder">
    </div>
    <script src="/js/include-header.js">
    </script>
    <div aria-hidden="true" class="nav-works-row" id="nav-works-row">
      <a class="nav-works-link"
        data-section="section-selected"
        href="#section-selected">
        Selected works
      </a>
      <a class="nav-works-link"
        data-section="section-commissioned"
        href="#section-commissioned">
        Commissioned designs
      </a>
      <a class="nav-works-link"
        data-section="section-residential"
        href="#section-residential">
        Residential Special Projects
      </a>
    </div>
    <main class="gallery" id="section-selected">
      <div class="gallery-grid" id="general">
        <!-- filled by /js/index.js from generalImages -->
      </div>
    </main>
    <section class="gallery-section" id="section-commissioned">
      <h2 class="section-title">
        Commissioned Designs
      </h2>
      <div class="gallery-grid" id="commissioned">
        <!-- filled by /js/index.js from commissionedImages -->
      </div>
    </section>
    <section class="gallery-section" id="section-residential">
      <h2 class="section-title">
        Residential Special Projects
      </h2>
      <div class="gallery-grid" id="residential">
        <!-- filled by /js/index.js from residentialImages -->
      </div>
    </section>
    <div id="footer-placeholder">
    </div>
    <script src="/js/include-footer.js">
    </script>
    <script src="/js/index.js">
    </script>
  </body>
</html>
