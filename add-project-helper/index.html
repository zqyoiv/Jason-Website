<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Project – Helper</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.25rem; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-top: 12px; margin-bottom: 4px; }
    input[type=text], textarea { width: 100%; padding: 8px; margin-bottom: 8px; }
    textarea { min-height: 80px; resize: vertical; }
    .block { border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; border-radius: 6px; background: #f9f9f9; }
    .block h3 { margin: 0 0 8px 0; font-size: 0.9rem; }
    .block-actions { margin-top: 8px; }
    button { padding: 8px 16px; cursor: pointer; }
    .add-block { margin: 16px 0; padding: 12px; border-radius: 6px; background: #ffc; border: 1px solid #dd0; }
    select { padding: 6px; margin-right: 8px; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .hint { font-size: 0.8rem; color: #666; margin-top: 2px; }
    #message { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; }
    #message.success { background: #d4edda; color: #155724; display: block; }
    #message.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <h1>Add project</h1>

  <form id="form">
    <label>Add project to</label>
    <select name="target" id="targetFile">
      <option value="general">General (general-project-data.js)</option>
      <option value="commision">Commission (commision-project-data.js)</option>
      <option value="residential">Residential (residential-project-data.js)</option>
    </select>

    <label>Project ID (URL slug, e.g. my-new-project)</label>
    <input type="text" name="projectId" required placeholder="my-new-project">

    <label>Title (e.g. MY NEW PROJECT)</label>
    <input type="text" name="title" required placeholder="MY NEW PROJECT">

    <label>Image folder path</label>
    <input type="text" name="imageFolder" placeholder="/images/page/my-new-project/">
    <span class="hint">Base path for image blocks. Trailing slash recommended.</span>

    <h2 style="margin-top: 24px;">Blocks</h2>
    <div id="blocks"></div>
    <div class="add-block" id="addBlockSection">
      <select id="blockType">
        <option value="full-image">Full image</option>
        <option value="full-video">Full video</option>
        <option value="two-column-image">Two column image</option>
        <option value="five-column-image">Five column image</option>
        <option value="full-text">Full text</option>
        <option value="project-content">Text (col 1 + col 2)</option>
      </select>
      <button type="button" id="addBlock">Add block</button>
    </div>

    <button type="submit" style="margin-top: 20px;">Submit – update selected file</button>
  </form>

  <div id="message"></div>

  <script>
    const blocksContainer = document.getElementById('blocks');
    const blockTypeSelect = document.getElementById('blockType');
    const addBlockBtn = document.getElementById('addBlock');
    const form = document.getElementById('form');
    const messageEl = document.getElementById('message');

    let blockIndex = 0;
    const blocks = [];

    function normalizePath(s) {
      if (!s) return '';
      s = s.replace(/\\/g, '/');
      if (s && !s.startsWith('/') && s.startsWith('images')) s = '/' + s;
      return s;
    }

    function ensureSlash(s) {
      if (!s) return '';
      s = normalizePath(s);
      return s.endsWith('/') ? s : s + '/';
    }

    function makeBlock(type) {
      const id = 'block-' + blockIndex++;
      const div = document.createElement('div');
      div.className = 'block';
      div.dataset.blockId = id;
      div.dataset.type = type;

      let inner = '<h3>' + type + '</h3>';
      if (type === 'full-image') {
        inner += '<label>Image path (filename or full path)</label><input type="text" name="path" placeholder="photo1.jpg">';
        inner += '<label>Alt text</label><input type="text" name="alt" placeholder="Description">';
      } else if (type === 'full-video') {
        inner += '<label>Video URL</label><input type="text" name="url" placeholder="https://... or /video.mp4">';
        inner += '<label>Caption (optional)</label><input type="text" name="caption" placeholder="Optional caption">';
      } else if (type === 'two-column-image') {
        inner += '<label>Left image path</label><input type="text" name="leftPath" placeholder="left.jpg">';
        inner += '<label>Left alt</label><input type="text" name="leftAlt" placeholder="Left">';
        inner += '<label>Right image path</label><input type="text" name="rightPath" placeholder="right.jpg">';
        inner += '<label>Right alt</label><input type="text" name="rightAlt" placeholder="Right">';
      } else if (type === 'five-column-image') {
        inner += '<label>Image path (same image repeated 5× across full width)</label><input type="text" name="path" placeholder="photo.jpg">';
        inner += '<label>Alt text</label><input type="text" name="alt" placeholder="Description">';
      } else if (type === 'full-text') {
        inner += '<label>Full-width text (one paragraph per line; start line with ## for heading)</label>';
        inner += '<textarea name="col1" placeholder="First paragraph.\n\n## Heading\n\nSecond paragraph."></textarea>';
      } else if (type === 'project-content') {
        inner += '<label>Column 1 – Description (one paragraph per line; start line with ## for heading)</label>';
        inner += '<textarea name="col1" placeholder="First paragraph.\n\n## Overview\n\nSecond paragraph."></textarea>';
        inner += '<label>Column 2 – Details (one per line: Label: Value)</label>';
        inner += '<textarea name="col2" placeholder="Artwork Title: My Work\nDimensions: 10\' x 20\'\nMedium: LED\nYear of Completion: 2024"></textarea>';
      }
      inner += '<div class="block-actions"><button type="button" class="remove-block">Remove</button></div>';
      div.innerHTML = inner;

      div.querySelector('.remove-block').addEventListener('click', function () {
        div.remove();
      });

      blocksContainer.appendChild(div);
      document.getElementById('addBlockSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    addBlockBtn.addEventListener('click', function () {
      makeBlock(blockTypeSelect.value);
    });

    function collectBlocks(imageFolder) {
      const collected = [];
      const blockEls = blocksContainer.querySelectorAll('.block');
      const base = ensureSlash(normalizePath(imageFolder));

      blockEls.forEach(function (el) {
        const type = el.dataset.type;
        if (type === 'full-image') {
          let path = el.querySelector('[name=path]').value.trim();
          const alt = el.querySelector('[name=alt]').value.trim();
          if (!path) return;
          path = normalizePath(path);
          const src = path.startsWith('/') ? path : base + path;
          collected.push({ type: 'full-image', src, alt });
        } else if (type === 'full-video') {
          let url = el.querySelector('[name=url]').value.trim();
          const caption = el.querySelector('[name=caption]').value.trim();
          if (!url) return;
          if (!/^https?:\/\//i.test(url)) url = normalizePath(url);
          collected.push({ type: 'full-video', src: url, caption: caption || undefined });
        } else if (type === 'two-column-image') {
          let leftPath = normalizePath(el.querySelector('[name=leftPath]').value.trim());
          let rightPath = normalizePath(el.querySelector('[name=rightPath]').value.trim());
          const leftAlt = el.querySelector('[name=leftAlt]').value.trim();
          const rightAlt = el.querySelector('[name=rightAlt]').value.trim();
          if (!leftPath || !rightPath) return;
          collected.push({
            type: 'two-column-image',
            left: { src: leftPath.startsWith('/') ? leftPath : base + leftPath, alt: leftAlt },
            right: { src: rightPath.startsWith('/') ? rightPath : base + rightPath, alt: rightAlt }
          });
        } else if (type === 'five-column-image') {
          let path = el.querySelector('[name=path]').value.trim();
          const alt = el.querySelector('[name=alt]').value.trim();
          if (!path) return;
          path = normalizePath(path);
          const src = path.startsWith('/') ? path : base + path;
          collected.push({ type: 'five-column-image', src, alt });
        } else if (type === 'full-text') {
          const col1 = el.querySelector('[name=col1]').value.trim();
          const description = [];
          col1.split('\n').forEach(function (line) {
            line = line.trim();
            if (!line) return;
            if (line.startsWith('## ')) {
              description.push({ tag: 'h2', content: line.slice(3).trim() });
            } else {
              description.push({ tag: 'p', content: line });
            }
          });
          collected.push({ type: 'full-text', description });
        } else if (type === 'project-content') {
          const col1 = el.querySelector('[name=col1]').value.trim();
          const col2 = el.querySelector('[name=col2]').value.trim();
          const description = [];
          col1.split('\n').forEach(function (line) {
            line = line.trim();
            if (!line) return;
            if (line.startsWith('## ')) {
              description.push({ tag: 'h2', content: line.slice(3).trim() });
            } else {
              description.push({ tag: 'p', content: line });
            }
          });
          const details = [];
          col2.split('\n').forEach(function (line) {
            line = line.trim();
            if (!line) return;
            const i = line.indexOf(':');
            if (i > 0) {
              details.push({ label: line.slice(0, i + 1).trim(), value: line.slice(i + 1).trim() });
            }
          });
          collected.push({ type: 'project-content', description, details });
        }
      });
      return collected;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const projectId = form.projectId.value.trim();
      const title = form.title.value.trim();
      const imageFolder = form.imageFolder.value.trim();
      const targetSelect = document.getElementById('targetFile');
      const target = (targetSelect && targetSelect.value) || 'general';
      const blocksData = collectBlocks(imageFolder);

      if (!projectId || !title) {
        messageEl.textContent = 'Please fill Project ID and Title.';
        messageEl.className = 'error';
        messageEl.style.display = 'block';
        return;
      }

      messageEl.style.display = 'none';
      fetch('/api/add-project', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId, title, target, blocks: blocksData })
      })
        .then(function (r) {
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || r.statusText); });
          return r.json();
        })
        .then(function (data) {
          const file = data.file || 'general-project-data.js';
          messageEl.textContent = 'Project "' + projectId + '" added to ' + file + '. ' + (data.path || '');
          messageEl.className = 'success';
          messageEl.style.display = 'block';
        })
        .catch(function (err) {
          messageEl.textContent = 'Error: ' + err.message;
          messageEl.className = 'error';
          messageEl.style.display = 'block';
        });
    });
  </script>
</body>
</html>
